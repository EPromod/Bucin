<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langkah di Bawah Rintik Hujan</title>
    <!-- Font Sacramento untuk tulisan sambung, Poppins untuk teks modern & form -->
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #030a05;
        }

        /* Video Background Jalan Setapak Hujan */
        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* Overlay gelap kehijauan yang syahdu menyesuaikan hutan hujan */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Canvas Efek Cahaya Ungu Bersinar */
        #purple-glow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        /* Kontainer Utama (Tetap Transparan Tanpa Kotak Background) */
        .box-container {
            max-width: 500px;
            width: 100%;
            background: transparent;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- HALAMAN 1: TOMBOL PEMBUKA & KATA SAMBUTAN --- */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            transition: all 0.5s ease;
        }

        .opening-greeting {
            font-family: 'Sacramento', cursive;
            font-size: 2.9rem;
            color: #f1fff3;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(138, 255, 157, 0.3);
            margin-bottom: 5px;
            animation: fadeInDown 1.5s ease;
        }

        /* Desain Tombol Ikon Premium & Futuristik */
        .open-btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
        }

        .open-btn {
            width: 76px;
            height: 76px;
            background: linear-gradient(135deg, #1b4d22, #0b2911);
            color: #8aff9d;
            border: 2px solid rgba(138, 255, 157, 0.6);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(138, 255, 157, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Efek Denyut Lingkaran Luar (Pulse Rings) */
        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(138, 255, 157, 0.4);
            border-radius: 50%;
            animation: ripple 2s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.7s;
        }

        .open-btn:hover {
            transform: scale(1.1);
            color: #ffffff;
            border-color: #8aff9d;
            box-shadow: 0 0 30px rgba(138, 255, 157, 0.8), inset 0 0 15px rgba(255, 255, 255, 0.2);
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; box-shadow: 0 0 20px rgba(186, 104, 200, 0.4); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HALAMAN 2: KOLOM MASUKKAN NAMA --- */
        .name-wrapper {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 320px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .name-wrapper label {
            font-size: 0.9rem;
            letter-spacing: 1px;
            color: #e2ffe6;
            display: block;
            margin-bottom: 15px;
            font-weight: 300;
        }

        .name-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(138, 255, 157, 0.4);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 18px;
            transition: all 0.3s;
        }

        .name-input:focus {
            border-color: rgba(138, 255, 157, 0.9);
            box-shadow: 0 0 10px rgba(138, 255, 157, 0.3);
        }

        .submit-btn {
            padding: 10px 30px;
            background: linear-gradient(45deg, #1b4d22, #2e7d32);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(50, 150, 70, 0.5);
        }

        /* --- HALAMAN 3: ISI PESAN (TULISAN SAMBUNG) --- */
        .letter-box {
            display: none;
            width: 100%;
            max-height: 100vh;
            background: transparent; 
            opacity: 0;
            transition: all 0.8s ease;
            overflow-y: auto;
            padding: 5px;
        }

        .letter-box::-webkit-scrollbar {
            width: 4px;
        }
        .letter-box::-webkit-scrollbar-thumb {
            background: rgba(138, 255, 157, 0.3);
            border-radius: 10px;
        }

        .romantic-text {
            font-family: 'Sacramento', cursive;
            font-size: 2.6rem; 
            line-height: 1.4;
            color: #f1fff3; 
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 1), 
                -2px -2px 4px rgba(0, 0, 0, 1),
                2px -2px 4px rgba(0, 0, 0, 1),
                -2px 2px 4px rgba(0, 0, 0, 1),
                0px 0px 20px rgba(186, 104, 200, 0.6);
            margin-bottom: 30px;
            word-wrap: break-word;
        }

        /* Tombol Balas WhatsApp */
        .wa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 30px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 25px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 10px rgba(37, 211, 102, 0.3);
            width: 100%;
            max-width: 290px;
            margin: 10px auto;
        }

        .wa-btn.show {
            opacity: 1;
            transform: scale(1);
            display: inline-flex;
        }

        .wa-btn:hover {
            background-color: #128C7E;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.6);
            transform: translateY(-2px);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #f1fff3;
            animation: blink 0.6s infinite;
            margin-left: 3px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

               /* Gaya Teks Nama Pojok Kanan Bawah (Pudar) */
        .watermark-name {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5; /* Berada di atas overlay dan video */
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35); /* Menggunakan alpha 0.35 agar efeknya pudar */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* Agar tidak mengganggu klik di layar */
            user-select: none; /* Agar teks tidak bisa diblok/diseleksi */
        }

    </style>
</head>
<body>

    <!-- Latar Belakang Video Jalan Setapak Hujan -->
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="VID-20260712-WA0021.mp4" type="video/mp4">
        Browser kamu tidak mendukung video latar belakang.
    </video>

    <!-- Musik Latar -->
    <audio id="romantic-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay"></div>

    <!-- Canvas Efek Partikel Ungu Bersinar -->
    <canvas id="purple-glow-canvas"></canvas>

    <div class="content-wrapper">
        <div class="box-container">
            
            <!-- HALAMAN 1: KATA PEMBUKA & ICON PEMBUKA KEREN -->
            <div class="envelope-wrapper" id="halamanIcon">
                <h1 class="opening-greeting">Rintik Harapan...</h1>
                
                <div class="open-btn-container">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                    <button class="open-btn" onclick="keHalamanNama()" aria-label="Buka">
                        <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25"/>
                        </svg>
                    </button>
                </div>
                
                <span style="font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; font-weight: 300; color: #f1fff3; text-shadow: 1px 1px 3px black; text-transform: uppercase; margin-top: 5px;">Ketuk untuk berteduh</span>
            </div>

            <!-- HALAMAN 2: COLOM MASUKKAN NAMA -->
            <div class="name-wrapper" id="halamanNama">
                <label for="inputNama">Sebelum melangkah lebih jauh, masukan  namanya dulu ya.</label>
                <input type="text" id="inputNama" class="name-input" placeholder="Tulis namamu di sini..." autocomplete="off">
                <button class="submit-btn" onclick="mulaiCerita()">Lanjutkan</button>
            </div>

            <!-- HALAMAN 3: ISI PESAN (TULISAN SAMBUNG) & TOMBOL WHATSAPP -->
            <div class="letter-box" id="kotakSurat">
                <div class="romantic-text">
                    <span id="text-typing"></span><span class="cursor" id="kursor">|</span>
                </div>
                <a href="#" id="tombolWA" class="wa-btn" style="display: none;" target="_blank">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 12.41 0H3.59A7.854 7.854 0 0 0 .707 2.326a8.857 8.857 0 0 0-1.07 4.195c0 2.308.814 4.503 2.31 6.223l-.963 3.507 3.597-.944a8.841 8.841 0 0 0 4.19 1.056h.003A7.854 7.854 0 0 0 16 8.583a8.857 8.857 0 0 0-2.399-6.257zM14.75 8.583a7.126 7.126 0 0 1-2.119 5.097 6.305 6.305 0 0 1-4.636 1.942H7.99c-1.391-.004-2.757-.373-3.951-1.066l-.283-.168-2.398.63.64-2.332-.185-.296A7.16 7.16 0 0 1 1.25 8.583a7.126 7.126 0 0 1 2.119-5.097A6.305 6.305 0 0 1 7.99 1.543h.004c1.865 0 3.617.726 4.933 2.042a7.126 7.126 0 0 1 2.123 5.098z"/>
                    </svg>
                    Balas ke WhatsApp
                </a>
            </div>

        </div>
    </div>

            <!-- Teks Nama di Pojok Kanan Bawah -->
    <div class="watermark-name">Edy | Cindy</div>

    <script>
        const musik = document.getElementById("romantic-music");
        const halamanIcon = document.getElementById("halamanIcon");
        const halamanNama = document.getElementById("halamanNama");
        const kotakSurat = document.getElementById("kotakSurat");
        const textElement = document.getElementById("text-typing");
        const tombolWA = document.getElementById("tombolWA");
        
        let index = 0;
        let pesanRomantis = "";

        function keHalamanNama() {
            halamanIcon.style.opacity = "0";
            halamanIcon.style.transform = "scale(0.9)";
            setTimeout(() => {
                halamanIcon.style.display = "none";
                halamanNama.style.display = "block";
                setTimeout(() => { halamanNama.style.opacity = "1"; }, 50);
            }, 400);
        }

        function mulaiCerita() {
            const namaUser = document.getElementById("inputNama").value.trim();
            
            if (namaUser === "") {
                alert("Masukkan namamu terlebih dahulu ya... 😊");
                return;
            }

            pesanRomantis = `Hai ${namaUser}, melihat jalan setapak yang basah di tengah hutan sunyi ini, aku teringat akan sebuah perjalanan. Seperti rintik hujan yang tak lelah membasahi bumi, seperti itulah rasa sayangku yang selalu mengalir untukmu. Di dalam dingin dan pekatnya badai kehidupan, kehadiranmu adalah satu-satunya payung yang meneduhkanku, menuntun setiap langkahku agar tidak tersesat. Terima kasih telah bersedia melangkah bersamaku melewati segala musim. Aku menyayangimu, selamanya...`;

            musik.play().catch(error => console.log("Musik dijeda sistem: ", error));

            halamanNama.style.display = "none";
            kotakSurat.style.display = "block";
            
            setTimeout(() => {
                kotakSurat.style.opacity = "1";
                ketikKarakter();
            }, 100);
        }

        function ketikKarakter() {
    if (index < pesanRomantis.length) {
        textElement.innerHTML += pesanRomantis.charAt(index);
        index++;
        kotakSurat.scrollTop = kotakSurat.scrollHeight;
        setTimeout(ketikKarakter, 80); 
    } else {
        document.getElementById("kursor").style.display = "none";
        
        const nomorWA = ""; // <--- JANGAN LUPA GANTI NOMOR WA DI SINI
        const isiBalasan = encodeURIComponent("Aku akan selalu melangkah bersamamu di setiap rintik hujan... ❤️");
        tombolWA.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${isiBalasan}`;
        
        // PERBAIKAN: Memastikan display diubah menjadi flex agar tombolnya muncul
        tombolWA.style.display = "inline-flex"; 
        setTimeout(() => {
            tombolWA.classList.add("show");
            kotakSurat.scrollTop = kotakSurat.scrollHeight;
        }, 50);
    }
}


        // --- SCRIPT EFEK PARTIKEL UNGU BERSINAR (GLOWING PURPLE PARTICLES) ---
        const canvas = document.getElementById('purple-glow-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const particleCount = 40; 

        class PurpleDust {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.5 + 0.3; 
                this.alpha = Math.random() * 0.5 + 0.2;
                this.fadeSpeed = Math.random() * 0.005 + 0.002;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                this.alpha += this.fadeSpeed;
                if (this.alpha <= 0.1 || this.alpha >= 0.7) {
                    this.fadeSpeed = -this.fadeSpeed;
                }

                if (this.y > canvas.height + 10) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                ctx.fillStyle = `rgba(190, 110, 255, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(156, 39, 176, 0.8)';
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new PurpleDust());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
