<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumah Terindahku Adalah Kamu</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #0b0705;
        }

        /* Background murni jernih tanpa blur */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG-20260712-WA0002.jpg'); /* Ganti dengan nama file/link gambar barumu */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Overlay sangat tipis dengan tone hangat agar serasi dengan warna emas/oranye gambar */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Canvas Efek Kunang-Kunang */
        #fireflies-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none; /* Tombol di bawahnya tetap bisa diklik */
        }

        .content-wrapper {
            position: relative;
            z-index: 4; /* Di atas canvas agar teks tidak tertutup */
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        /* Halaman Pembuka */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.8s ease;
        }

        /* Tombol pembuka berupa Icon berbentuk lingkaran bernuansa emas hangat */
        .open-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #d48c27, #844c09);
            color: white;
            border: 2px solid rgba(255, 223, 137, 0.6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(212, 140, 39, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2s infinite;
        }

        .open-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 223, 137, 0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 140, 39, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 223, 137, 0.6); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 140, 39, 0.4); }
        }

        /* Kotak Pesan - Background kotak transparan total dihapus, hanya menyisakan area scroll */
        .letter-box {
            display: none;
            max-width: 500px;
            width: 100%;
            max-height: 100vh;
            background: transparent; /* Diubah menjadi transparan penuh */
            padding: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            overflow-y: auto;
        }

        /* Custom Scrollbar minimalis transparan */
        .letter-box::-webkit-scrollbar {
            width: 4px;
        }
        .letter-box::-webkit-scrollbar-thumb {
            background: rgba(255, 223, 137, 0.4);
            border-radius: 10px;
        }

        /* Style Tulisan Sambung Romantis - Ditambahkan shadow tebal agar terbaca jelas tanpa background kotak */
        .romantic-text {
            font-family: 'Sacramento', cursive;
            font-size: 2.2rem; 
            line-height: 1.5;
            color: #ffe8bc; /* Warna krem hangat agar serasi dengan bulan */
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 0.9), 
                -2px -2px 4px rgba(0, 0, 0, 0.9),
                2px -2px 4px rgba(0, 0, 0, 0.9),
                -2px 2px 4px rgba(0, 0, 0, 0.9),
                0px 0px 15px rgba(255, 210, 115, 0.3);
            margin-bottom: 30px;
            word-wrap: break-word;
        }

        /* Tombol Balas WhatsApp */
        .wa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 28px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 25px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), 0 0 10px rgba(37, 211, 102, 0.4);
            width: 100%;
            max-width: 280px;
            margin: 10px auto;
        }

        .wa-btn.show {
            opacity: 1;
            transform: scale(1);
            display: inline-flex;
        }

        .wa-btn:hover {
            background-color: #128C7E;
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.6);
            transform: translateY(-2px);
        }

        /* Efek kedip kursor ngetik */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #ffe8bc;
            animation: blink 0.6s infinite;
            margin-left: 3px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

             /* Gaya Teks Nama Pojok Kanan Bawah (Pudar) */
        .watermark-name {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5; /* Berada di atas overlay dan video */
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35); /* Menggunakan alpha 0.35 agar efeknya pudar */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* Agar tidak mengganggu klik di layar */
            user-select: none; /* Agar teks tidak bisa diblok/diseleksi */
        }

    </style>
</head>
<body>

    <audio id="romantic-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung pemutar musik.
    </audio>

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <canvas id="fireflies-canvas"></canvas>

    <div class="content-wrapper">
        <div class="envelope-wrapper" id="pembuka">
            <button class="open-btn" onclick="mulaiRomantis()" aria-label="Buka Pesan">
                <svg width="36" height="36" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2.51 1.632 3.82 2.47a1 1 0 0 0 1.079-.02l3.992-2.499A.5.5 0 0 0 11 4.758h-6a.5.5 0 0 0-.49.874zM16 6.897L10.34 10.43a2 2 0 0 1-2.157.04L2 6.945V12a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1z"/>
                </svg>
            </button>
            <span style="font-size: 0.9rem; letter-spacing: 1px; opacity: 0.8; font-weight: 300; color: #ffe8bc; text-shadow: 1px 1px 3px black;">Ketuk untuk masuk...</span>
        </div>

        <div class="letter-box" id="kotakSurat">
            <div class="romantic-text">
                <span id="text-typing"></span><span class="cursor" id="kursor">|</span>
            </div>
            <a href="#" id="tombolWA" class="wa-btn" style="display: none;" target="_blank">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 12.41 0H3.59A7.854 7.854 0 0 0 .707 2.326a8.857 8.857 0 0 0-1.07 4.195c0 2.308.814 4.503 2.31 6.223l-.963 3.507 3.597-.944a8.841 8.841 0 0 0 4.19 1.056h.003A7.854 7.854 0 0 0 16 8.583a8.857 8.857 0 0 0-2.399-6.257zM14.75 8.583a7.126 7.126 0 0 1-2.119 5.097 6.305 6.305 0 0 1-4.636 1.942H7.99c-1.391-.004-2.757-.373-3.951-1.066l-.283-.168-2.398.63.64-2.332-.185-.296A7.16 7.16 0 0 1 1.25 8.583a7.126 7.126 0 0 1 2.119-5.097A6.305 6.305 0 0 1 7.99 1.543h.004c1.865 0 3.617.726 4.933 2.042a7.126 7.126 0 0 1 2.123 5.098z"/>
                </svg>
                Balas Pesan Ini Kepadanya
            </a>
        </div>
    </div>

        <!-- Teks Nama di Pojok Kanan Bawah -->
    <div class="watermark-name">Edy | Cindy</div>


    <script>
        const pesanRomantis = "Sejauh apa pun aku melangkah di bawah sunyinya malam, hatiku akan selalu tahu jalan untuk kembali. Seperti rumah kecil yang hangat ini di tengah padang kunang-kunang, kamulah tempat ternyaman yang selalu memeluk lelahku. Di bawah indahnya bulan sabit emas ini, aku menyadari satu hal... bahwa duniaku paling indah, adalah saat berada di dekatmu. Tetaplah jadi rumah tempatku pulang, ya? Aku menyayangimu...";

        const textElement = document.getElementById("text-typing");
        const tombolWA = document.getElementById("tombolWA");
        const musik = document.getElementById("romantic-music");
        const kotakSurat = document.getElementById("kotakSurat");
        let index = 0;

        function mulaiRomantis() {
            musik.play().catch(error => console.log("Musik gagal dimainkan: ", error));

            document.getElementById("pembuka").style.display = "none";

            kotakSurat.style.display = "block";
            setTimeout(() => {
                kotakSurat.style.opacity = "1";
                kotakSurat.style.transform = "translateY(0)";
                ketikKarakter();
            }, 100);
        }

        function ketikKarakter() {
            if (index < pesanRomantis.length) {
                textElement.innerHTML += pesanRomantis.charAt(index);
                index++;
                
                kotakSurat.scrollTop = kotakSurat.scrollHeight;

                setTimeout(ketikKarakter, 85); 
            } else {
                document.getElementById("kursor").style.display = "none";
                
                const nomorWA = "628xxxxxxxxxx"; // GANTI nomor di sini dengan nomor WA-mu
                const isiBalasan = encodeURIComponent("Aku akan selalu menjadi rumah terbaik tempatmu pulang... ❤️");
                tombolWA.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${isiBalasan}`;
                
                tombolWA.classList.add("show");
                setTimeout(() => {
                    kotakSurat.scrollTop = kotakSurat.scrollHeight;
                }, 100);
            }
        }

        // --- SCRIPT EFEK KUNANG-KUNANG (FIREFLIES EFFECT) ---
        const canvas = document.getElementById('fireflies-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const fireflies = [];
        const fireflyCount = 40; // Jumlah partikel kunang-kunang di layar

        class Firefly {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; // Ukuran partikel kecil bercahaya
                this.speedX = Math.random() * 0.4 - 0.2; // Gerakan horisontal acak lembut
                this.speedY = Math.random() * 0.3 - 0.15; // Gerakan vertikal acak lembut
                this.alpha = Math.random() * 0.5 + 0.2;
                this.fadeSpeed = Math.random() * 0.01 + 0.005;
                this.glowColor = Math.random() > 0.5 ? 'rgba(255, 180, 50, ' : 'rgba(255, 215, 100, ';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // Efek redup-terang (berkedip alami)
                this.alpha += this.fadeSpeed;
                if (this.alpha <= 0.1 || this.alpha >= 0.8) {
                    this.fadeSpeed = -this.fadeSpeed; // Balik arah pudar
                }

                // Jika keluar dari area layar, munculkan lagi di sisi berlawanan
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                // Membuat gradasi pendaran kunang-kunang
                ctx.fillStyle = `${this.glowColor}${this.alpha})`;
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255, 170, 40, 0.6)';
                ctx.fill();
                ctx.restore();
            }
        }

        // Mengisi array kunang-kunang
        for (let i = 0; i < fireflyCount; i++) {
            fireflies.push(new Firefly());
        }

        // Loop animasi
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fireflies.forEach(f => {
                f.update();
                f.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

          // untuk security

       document.addEventListener('keydown', function(event) {
    // Menonaktifkan Ctrl+S (Simpan)
    if (event.ctrlKey && event.key === 's') {
        event.preventDefault();
        alert('Menyimpan halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+P (Cetak)
    if (event.ctrlKey && event.key === 'p') {
        event.preventDefault();
        alert('Mencetak halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+U (Lihat Sumber Halaman)
    if (event.ctrlKey && event.key === 'u') {
        event.preventDefault();
        alert('Melihat sumber halaman dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+F dan Ctrl+G (Kolom Pencarian)
    if (event.ctrlKey && (event.key === 'f' || event.key === 'g')) {
        event.preventDefault();
        alert('Fungsi pencarian di halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+C (Salin)
    if (event.ctrlKey && event.key === 'c') {
        event.preventDefault();
        alert('Menyalin konten dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+A (Pilih Semua)
    if (event.ctrlKey && event.key === 'a') {
        event.preventDefault();
        alert('Memilih semua konten dinonaktifkan.');
    }

     
    // Menonaktifkan F12 (Alat Pengembang)
    if (event.key === 'F12') {
        event.preventDefault();
        alert('Alat pengembang dinonaktifkan.');
    }
});

// Menonaktifkan menu klik kanan (menu konteks)
document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
    alert('Klik kanan dinonaktifkan.');
});


    </script>
</body>
</html>
