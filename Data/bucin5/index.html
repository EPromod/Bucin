<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehangatan di Tengah Rintik Hujan</title>
    <!-- Menggunakan Sacramento untuk tulisan sambung dan Poppins untuk teks biasa -->
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #05080e;
        }

        /* Latar Belakang Video Suasana Hujan Lebat di Kamar Hutan */
        .bg-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        /* Overlay gelap dingin untuk menyeimbangkan cahaya lilin hangat */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Canvas untuk Efek Partikel Cahaya Ungu Bersinar */
        #purple-rain-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        /* Halaman Pembuka */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.8s ease;
        }

        /* Tombol pembuka dengan nuansa lentera hangat */
        .open-btn {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #cc7a00, #4a2700);
            color: white;
            border: 2px solid rgba(255, 200, 100, 0.5);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(204, 122, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: pulse 2.5s infinite;
        }

        .open-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 35px rgba(255, 200, 100, 0.8);
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(204, 122, 0, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 150, 0, 0.7); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(204, 122, 0, 0.5); }
        }

        /* Kotak Pesan Transparan Tanpa Latar Belakang Kotak */
        .letter-box {
            display: none;
            max-width: 520px;
            width: 100%;
            max-height: 100vh;
            background: transparent; 
            padding: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
            overflow-y: auto;
        }

        .letter-box::-webkit-scrollbar {
            width: 4px;
        }
        .letter-box::-webkit-scrollbar-thumb {
            background: rgba(255, 200, 100, 0.3);
            border-radius: 10px;
        }

        /* Model Tulisan Sambung dengan Glow Ungu Lembut */
        .romantic-text {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem; 
            line-height: 1.5;
            color: #fff0d5; /* Warna krem hangat seperti cahaya lilin */
            text-shadow: 
                2px 2px 5px rgba(0, 0, 0, 1), 
                -2px -2px 5px rgba(0, 0, 0, 1),
                2px -2px 5px rgba(0, 0, 0, 1),
                -2px 2px 5px rgba(0, 0, 0, 1),
                0px 0px 20px rgba(186, 104, 200, 0.6); /* Efek pendaran ungu pada tulisan */
            margin-bottom: 35px;
            word-wrap: break-word;
        }

        /* Tombol Balas WhatsApp */
        .wa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 30px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 25px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 10px rgba(37, 211, 102, 0.3);
            width: 100%;
            max-width: 290px;
            margin: 10px auto;
        }

        .wa-btn.show {
            opacity: 1;
            transform: scale(1);
            display: inline-flex;
        }

        .wa-btn:hover {
            background-color: #128C7E;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            transform: translateY(-2px);
        }

        /* Kursor ketik */
        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #fff0d5;
            animation: blink 0.6s infinite;
            margin-left: 3px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

         /* Gaya Teks Nama Pojok Kanan Bawah (Pudar) */
        .watermark-name {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5; /* Berada di atas overlay dan video */
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35); /* Menggunakan alpha 0.35 agar efeknya pudar */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none; /* Agar tidak mengganggu klik di layar */
            user-select: none; /* Agar teks tidak bisa diblok/diseleksi */
        }

    </style>
</head>
<body>

    <!-- Ganti "video.mp4" dengan nama file video suasana hujan milikmu -->
    <video class="bg-video" autoplay loop muted playsinline>
        <source src="VID-20260712-WA0005.mp4" type="video/mp4">
        Browser kamu tidak mendukung video latar belakang.
    </video>

    <!-- Musik latar romantis/suara hujan pendukung -->
    <audio id="romantic-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay"></div>

    <!-- Canvas Efek Partikel Cahaya Ungu Bersinar -->
    <canvas id="purple-rain-canvas"></canvas>

    <div class="content-wrapper">
        <!-- Tombol Pembuka -->
        <div class="envelope-wrapper" id="pembuka">
            <button class="open-btn" onclick="mulaiRomantis()" aria-label="Buka Pesan">
                <svg width="34" height="34" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M2 3a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm11 1.166V11.1A4.5 4.5 0 0 0 11.1 13H4.9A4.5 4.5 0 0 0 3 11.1V4.166l4.636 3.09a1 1 0 0 0 1.11B8L13 4.166z"/>
                </svg>
            </button>
            <span style="font-size: 0.85rem; letter-spacing: 2px; opacity: 0.8; font-weight: 300; color: #fff0d5; text-shadow: 1px 1px 4px black; text-transform: uppercase;">Dengarkan rintik hujan...</span>
        </div>

        <!-- Kotak Pesan Transparan -->
        <div class="letter-box" id="kotakSurat">
            <div class="romantic-text">
                <span id="text-typing"></span><span class="cursor" id="kursor">|</span>
            </div>
            <a href="#" id="tombolWA" class="wa-btn" style="display: none;" target="_blank">
                <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M13.601 2.326A7.854 7.854 0 0 0 12.41 0H3.59A7.854 7.854 0 0 0 .707 2.326a8.857 8.857 0 0 0-1.07 4.195c0 2.308.814 4.503 2.31 6.223l-.963 3.507 3.597-.944a8.841 8.841 0 0 0 4.19 1.056h.003A7.854 7.854 0 0 0 16 8.583a8.857 8.857 0 0 0-2.399-6.257zM14.75 8.583a7.126 7.126 0 0 1-2.119 5.097 6.305 6.305 0 0 1-4.636 1.942H7.99c-1.391-.004-2.757-.373-3.951-1.066l-.283-.168-2.398.63.64-2.332-.185-.296A7.16 7.16 0 0 1 1.25 8.583a7.126 7.126 0 0 1 2.119-5.097A6.305 6.305 0 0 1 7.99 1.543h.004c1.865 0 3.617.726 4.933 2.042a7.126 7.126 0 0 1 2.123 5.098z"/>
                </svg>
                Balas Hangat Pesan Ini
            </a>
        </div>
    </div>

         <!-- Teks Nama di Pojok Kanan Bawah -->
    <div class="watermark-name">Edy | Cindy</div>


    <script>
        // Kata-kata yang disesuaikan dengan suasana kamar hangat di tengah dinginnya hutan hujan
        const pesanRomantis = "Mendengar suara gemuruh rintik hujan di luar sana, berpadu dengan hangatnya cahaya lilin yang menari lembut, membuatku sadar betapa indahnya kedamaian ini. Di tengah dinginnya dunia yang badai, kamu adalah ruang ternyaman yang selalu melindungiku. Bersamamu, sedingin apa pun cuaca di luar, hatiku selalu merasa hangat dan aman. Terima kasih telah menjadi rumah tempatku pulang di setiap suasana. Aku menyayangimu, teramat sangat, di dalam setiap tetes hujan malam ini...";

        const textElement = document.getElementById("text-typing");
        const tombolWA = document.getElementById("tombolWA");
        const musik = document.getElementById("romantic-music");
        const kotakSurat = document.getElementById("kotakSurat");
        let index = 0;

        function mulaiRomantis() {
            musik.play().catch(error => console.log("Musik gagal dimainkan: ", error));
            document.getElementById("pembuka").style.display = "none";
            kotakSurat.style.display = "block";
            setTimeout(() => {
                kotakSurat.style.opacity = "1";
                kotakSurat.style.transform = "translateY(0)";
                ketikKarakter();
            }, 100);
        }

        function ketikKarakter() {
            if (index < pesanRomantis.length) {
                textElement.innerHTML += pesanRomantis.charAt(index);
                index++;
                kotakSurat.scrollTop = kotakSurat.scrollHeight;
                setTimeout(ketikKarakter, 85); 
            } else {
                document.getElementById("kursor").style.display = "none";
                const nomorWA = "628xxxxxxxxxx"; // Isi nomor WhatsApp tujuan di sini
                const isiBalasan = encodeURIComponent("Hujan ini terasa hangat karena ada kamu... ❤️");
                tombolWA.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${isiBalasan}`;
                tombolWA.classList.add("show");
                setTimeout(() => { kotakSurat.scrollTop = kotakSurat.scrollHeight; }, 100);
            }
        }

        // --- SCRIPT ANIMASI PARTIKEL UNGU BERSINAR (GLOWING PURPLE PARTICLES) ---
        const canvas = document.getElementById('purple-rain-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const particleCount = 45; 

        class PurpleDust {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.2 - 0.1;
                this.speedY = Math.random() * 0.4 + 0.2; // Jatuh perlahan searah arah air hujan
                this.alpha = Math.random() * 0.5 + 0.2;
                this.fadeSpeed = Math.random() * 0.005 + 0.002;
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;

                this.alpha += this.fadeSpeed;
                if (this.alpha <= 0.1 || this.alpha >= 0.7) {
                    this.fadeSpeed = -this.fadeSpeed;
                }

                if (this.y > canvas.height + 10) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                // Warna ungu neon/violet magis berbaur dengan suasana hujan
                ctx.fillStyle = `rgba(200, 130, 255, ${this.alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(156, 39, 176, 0.8)';
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new PurpleDust());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // untuk security
                     
       document.addEventListener('keydown', function(event) {
    // Menonaktifkan Ctrl+S (Simpan)
    if (event.ctrlKey && event.key === 's') {
        event.preventDefault();
        alert('Menyimpan halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+P (Cetak)
    if (event.ctrlKey && event.key === 'p') {
        event.preventDefault();
        alert('Mencetak halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+U (Lihat Sumber Halaman)
    if (event.ctrlKey && event.key === 'u') {
        event.preventDefault();
        alert('Melihat sumber halaman dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+F dan Ctrl+G (Kolom Pencarian)
    if (event.ctrlKey && (event.key === 'f' || event.key === 'g')) {
        event.preventDefault();
        alert('Fungsi pencarian di halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+C (Salin)
    if (event.ctrlKey && event.key === 'c') {
        event.preventDefault();
        alert('Menyalin konten dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+A (Pilih Semua)
    if (event.ctrlKey && event.key === 'a') {
        event.preventDefault();
        alert('Memilih semua konten dinonaktifkan.');
    }

    // Menonaktifkan F12 (Alat Pengembang)
    if (event.key === 'F12') {
        event.preventDefault();
        alert('Alat pengembang dinonaktifkan.');
    }
});

// Menonaktifkan menu klik kanan (menu konteks)
document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
    alert('Klik kanan dinonaktifkan.');
});

    </script>
</body>
</html>
