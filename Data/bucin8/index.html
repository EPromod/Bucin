<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Di Bawah Langit Malam yang Sama</title>
    <!-- Font Sacramento untuk tulisan sambung, Poppins untuk teks modern & form -->
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #020617;
        }

        /* Latar Belakang Gambar Langit Bintang (Ubah bg.jpg dengan file gambarmu) */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG-20260712-WA0020.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Overlay gelap misterius kebiruan */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Canvas Efek Bintang Jatuh & Berkedip */
        #galaxy-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        .content-wrapper {
            position: relative;
            z-index: 4;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }

        .box-container {
            max-width: 500px;
            width: 95%;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- HALAMAN 1: KATA PEMBUKA & IKON BINTANG BARU --- */
        .envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            transition: all 0.5s ease;
        }

        .opening-greeting {
            font-family: 'Sacramento', cursive;
            font-size: 3rem;
            color: #e2f1ff;
            text-shadow: 0 0 10px rgba(147, 197, 253, 0.6), 0 2px 8px rgba(0,0,0,0.8);
            animation: fadeInDown 1.5s ease;
        }

        /* Ikon Bintang Bersinar Melayang */
        .star-btn-container {
            position: relative;
            width: 90px;
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .star-btn {
            width: 64px;
            height: 64px;
            background: radial-gradient(circle, #3b82f6 0%, #1d4ed8 100%);
            color: #ffffff;
            border: none;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.8), inset 0 0 10px rgba(255,255,255,0.5);
            transition: all 0.4s ease;
            animation: float 3s ease-in-out infinite;
        }

        .star-btn-container::before {
            content: '';
            position: absolute;
            width: 80px;
            height: 80px;
            border: 1px dashed rgba(147, 197, 253, 0.5);
            border-radius: 50%;
            animation: spin 10s linear infinite;
        }

        .star-btn-container:hover .star-btn {
            transform: scale(1.15);
            box-shadow: 0 0 40px rgba(147, 197, 253, 1);
            background: radial-gradient(circle, #60a5fa 0%, #1e40af 100%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* --- HALAMAN 2: FORM NAMA MINIMALIS GARIS BERSINAR --- */
        .name-wrapper {
            display: none;
            opacity: 0;
            width: 100%;
            max-width: 340px;
            padding: 30px 20px;
            transition: all 0.5s ease;
        }

        .name-wrapper label {
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            color: #93c5fd;
            display: block;
            margin-bottom: 25px;
            text-shadow: 1px 1px 2px black;
        }

        /* Input tipis transparan hanya garis bawah yang menyala */
        .name-input {
            width: 100%;
            padding: 10px 0;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(147, 197, 253, 0.4);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 30px;
            transition: all 0.3s;
        }

        .name-input:focus {
            border-bottom-color: #3b82f6;
            box-shadow: 0 4px 10px -4px rgba(59, 130, 246, 0.5);
        }

        .submit-btn {
            padding: 9px 35px;
            background: transparent;
            color: #93c5fd;
            border: 1px solid #93c5fd;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 400;
            letter-spacing: 2px;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: #93c5fd;
            color: #020617;
            box-shadow: 0 0 15px rgba(147, 197, 253, 0.6);
        }

        /* --- HALAMAN 3: TULISAN SAMBUNG GALAXY GLOW --- */
        .letter-box {
            display: none;
            width: 100%;
            max-height: 75vh;
            background: transparent; 
            opacity: 0;
            transition: all 0.8s ease;
            overflow-y: auto;
            padding: 5px;
        }

        .letter-box::-webkit-scrollbar {
            width: 4px;
        }
        .letter-box::-webkit-scrollbar-thumb {
            background: rgba(147, 197, 253, 0.3);
            border-radius: 10px;
        }

        .romantic-text {
            font-family: 'Sacramento', cursive;
            font-size: 2.7rem; 
            line-height: 1.4;
            color: #f0f7ff; 
            text-shadow: 
                2px 2px 4px rgba(0, 0, 0, 1), 
                -2px -2px 4px rgba(0, 0, 0, 1),
                0px 0px 20px rgba(168, 85, 247, 0.5); /* Glow Ungu/Biru Nebula */
            margin-bottom: 35px;
            word-wrap: break-word;
        }

        /* Tombol Balas WhatsApp (Fix display inline-flex) */
        .wa-btn {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 30px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 25px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 290px;
            margin: 10px auto;
        }

        .wa-btn.show {
            opacity: 1;
            transform: scale(1);
        }

        .wa-btn:hover {
            background-color: #128C7E;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            transform: translateY(-2px);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #f0f7ff;
            animation: blink 0.6s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- WATERMARK NAMA PUDAR (POJOK KANAN BAWAH) --- */
        .watermark-name {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Latar Belakang Gambar -->
    <div class="bg-image"></div>
    <div class="overlay"></div>

    <!-- Musik Latar -->
    <audio id="romantic-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <!-- Canvas Efek Bintang -->
    <canvas id="galaxy-canvas"></canvas>

    <div class="content-wrapper">
        <div class="box-container">
            
            <!-- HALAMAN 1: KATA PEMBUKA & ICON BINTANG KEJORA -->
            <div class="envelope-wrapper" id="halamanIcon">
                <h1 class="opening-greeting">Di Bawah Langit yang Sama...</h1>
                <div class="star-btn-container" onclick="keHalamanNama()">
                    <button class="star-btn" aria-label="Buka Misteri">
                        <svg width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
                        </svg>
                    </button>
                </div>
                <span style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.7; color: #93c5fd; text-transform: uppercase;">Sentuh Bintang</span>
            </div>

            <!-- HALAMAN 2: COLOM MASUKKAN NAMA (MINIMALIS) -->
            <div class="name-wrapper" id="halamanNama">
                <label for="inputNama">Sebelum memandang bintang lebih jauh, boleh saya tau namamu?</label>
                <input type="text" id="inputNama" class="name-input" placeholder="Ketik nama di sini..." autocomplete="off">
                <button class="submit-btn" onclick="mulaiCerita()">Buka Pesan</button>
            </div>

            <!-- HALAMAN 3: ISI PESAN TULISAN SAMBUNG -->
            <div class="letter-box" id="kotakSurat">
                <div class="romantic-text">
                    <span id="text-typing"></span><span class="cursor" id="kursor">|</span>
                </div>
                <a href="#" id="tombolWA" class="wa-btn" target="_blank">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M13.601 2.326A7.854 7.854 0 0 0 12.41 0H3.59A7.854 7.854 0 0 0 .707 2.326a8.857 8.857 0 0 0-1.07 4.195c0 2.308.814 4.503 2.31 6.223l-.963 3.507 3.597-.944a8.841 8.841 0 0 0 4.19 1.056h.003A7.854 7.854 0 0 0 16 8.583a8.857 8.857 0 0 0-2.399-6.257zM14.75 8.583a7.126 7.126 0 0 1-2.119 5.097 6.305 6.305 0 0 1-4.636 1.942H7.99c-1.391-.004-2.757-.373-3.951-1.066l-.283-.168-2.398.63.64-2.332-.185-.296A7.16 7.16 0 0 1 1.25 8.583a7.126 7.126 0 0 1 2.119-5.097A6.305 6.305 0 0 1 7.99 1.543h.004c1.865 0 3.617.726 4.933 2.042a7.126 7.126 0 0 1 2.123 5.098z"/>
                    </svg>
                    Balas Pesan ke WhatsApp
                </a>
            </div>

        </div>
    </div>

    <!-- Teks Nama Permanen Pudar -->
    <div class="watermark-name">Edy | Cindy</div>

    <script>
        const musik = document.getElementById("romantic-music");
        const halamanIcon = document.getElementById("halamanIcon");
        const halamanNama = document.getElementById("halamanNama");
        const kotakSurat = document.getElementById("kotakSurat");
        const textElement = document.getElementById("text-typing");
        const tombolWA = document.getElementById("tombolWA");
        
        let index = 0;
        let pesanRomantis = "";

        function keHalamanNama() {
            halamanIcon.style.opacity = "0";
            setTimeout(() => {
                halamanIcon.style.display = "none";
                halamanNama.style.display = "block";
                setTimeout(() => { halamanNama.style.opacity = "1"; }, 50);
            }, 400);
        }

        function mulaiCerita() {
            const namaUser = document.getElementById("inputNama").value.trim();
            if (namaUser === "") {
                alert("Namamu belum diisi, tulis dulu ya... 😊");
                return;
            }

            // Tema kata-kata disesuaikan dengan luasnya langit malam dan bintang kesunyian
            pesanRomantis = `Hai ${namaUser}, memandang luasnya hamparan bintang di langit malam yang sunyi ini, membuatku sadar betapa kecilnya aku di semesta ini. Namun di antara jutaan kilau misteri di atas sana, kamulah satu-satunya konstelasi terindah yang berhasil menuntun hatiku yang sempat tersesat sepi. Menatap langit tak lagi terasa sunyi sejak ada kamu di dalam pikiranku. Terima kasih telah menjadi bintang paling terang di hidupku. Aku menyayangimu, melampaui indahnya malam ini...`;

            musik.play().catch(e => console.log("Musik tertahan browser: ", e));

            halamanNama.style.display = "none";
            kotakSurat.style.display = "block";
            
            setTimeout(() => {
                kotakSurat.style.opacity = "1";
                ketikKarakter();
            }, 100);
        }

        function ketikKarakter() {
            if (index < pesanRomantis.length) {
                textElement.innerHTML += pesanRomantis.charAt(index);
                index++;
                kotakSurat.scrollTop = kotakSurat.scrollHeight;
                setTimeout(ketikKarakter, 80); 
            } else {
                document.getElementById("kursor").style.display = "none";
                
                const nomorWA = "628xxxxxxxxxx"; // GANTI DENGAN NOMOR WHATSAPP-MU
                const isiBalasan = encodeURIComponent("Kamu juga bintang terindah di hatiku... ❤️✨");
                tombolWA.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${isiBalasan}`;
                
                // Fix bug: diubah langsung ke inline-flex sebelum transisi class
                tombolWA.style.display = "inline-flex";
                setTimeout(() => {
                    tombolWA.classList.add("show");
                    kotakSurat.scrollTop = kotakSurat.scrollHeight;
                }, 50);
            }
        }

        // --- SCRIPT EFEK BINTANG BERKEDIP & BINTANG JATUH (STARRY SKY EFFECT) ---
        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const stars = [];
        const starCount = 60;

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.7; // Fokus di langit bagian atas
                this.size = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.alpha += this.speed;
                if (this.alpha <= 0.1 || this.alpha >= 1) {
                    this.speed = -this.speed;
                }
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Komponen Bintang Jatuh (Shooting Star)
        class ShootingStar {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.4;
                this.length = Math.random() * 80 + 40;
                this.speed = Math.random() * 4 + 3;
                this.alpha = 1;
            }
            update() {
                this.x -= this.speed;
                this.y += this.speed * 0.5; // Bergerak diagonal ke bawah kiri
                this.alpha -= 0.015;
                if (this.alpha <= 0) {
                    this.reset();
                }
            }
            draw() {
                ctx.save();
                ctx.strokeStyle = `rgba(147, 197, 253, ${this.alpha})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.length, this.y - this.length * 0.5);
                ctx.stroke();
                ctx.restore();
            }
        }

        for (let i = 0; i < starCount; i++) stars.push(new Star());
        const shootingStar = new ShootingStar();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.update();
                s.draw();
            });
            shootingStar.update();
            shootingStar.draw();
            requestAnimationFrame(animate);
        }
        animate();

         // untuk security

       document.addEventListener('keydown', function(event) {
    // Menonaktifkan Ctrl+S (Simpan)
    if (event.ctrlKey && event.key === 's') {
        event.preventDefault();
        alert('Menyimpan halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+P (Cetak)
    if (event.ctrlKey && event.key === 'p') {
        event.preventDefault();
        alert('Mencetak halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+U (Lihat Sumber Halaman)
    if (event.ctrlKey && event.key === 'u') {
        event.preventDefault();
        alert('Melihat sumber halaman dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+F dan Ctrl+G (Kolom Pencarian)
    if (event.ctrlKey && (event.key === 'f' || event.key === 'g')) {
        event.preventDefault();
        alert('Fungsi pencarian di halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+C (Salin)
    if (event.ctrlKey && event.key === 'c') {
        event.preventDefault();
        alert('Menyalin konten dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+A (Pilih Semua)
    if (event.ctrlKey && event.key === 'a') {
        event.preventDefault();
        alert('Memilih semua konten dinonaktifkan.');
    }

    // Menonaktifkan F12 (Alat Pengembang)
    if (event.key === 'F12') {
        event.preventDefault();
        alert('Alat pengembang dinonaktifkan.');
    }
});

// Menonaktifkan menu klik kanan (menu konteks)
document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
    alert('Klik kanan dinonaktifkan.');
});
    </script>
</body>
</html>
