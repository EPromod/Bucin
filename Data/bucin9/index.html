<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinar Teratai di Tepi Danau Sunyi</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            background-color: #040d1a;
        }

        /* Background Gambar Danau Teratai Bersinar */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('IMG-20260712-WA0019.jpg'); /* Pastikan nama file ini sesuai */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Overlay mistis biru gelap air danau */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Canvas Efek Kunang-Kunang Air Danau */
        #fireflies-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* --- CONTAINER SLIDE HORIZONTAL --- */
        /* Membungkus halaman agar bisa bergeser ke samping secara mulus */
        .slider-container {
            position: relative;
            z-index: 4;
            width: 300%; /* 3 halaman dikali 100% */
            height: 100%;
            display: flex;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1); /* Efek geser melambat estetik */
        }

        .slide {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
            color: #ffffff;
        }

        .box-container {
            max-width: 500px;
            width: 95%;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* --- GAYA KHAS SLIDE 1 (BULAN SABIT) --- */
        .opening-greeting {
            font-family: 'Sacramento', cursive;
            font-size: 3rem;
            color: #e0f2fe;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6), 0 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 25px;
        }

        .moon-btn {
            width: 76px;
            height: 76px;
            background: radial-gradient(circle, #0284c7 0%, #0c4a6e 100%);
            color: #bae6fd;
            border: 2px solid rgba(186, 230, 253, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.7);
            transition: all 0.4s ease;
            animation: pulse-moon 2.5s infinite;
        }

        .moon-btn:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.9);
            color: #ffffff;
        }

        @keyframes pulse-moon {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(14, 165, 233, 0.5); }
            50% { transform: scale(1.06); box-shadow: 0 0 35px rgba(14, 165, 233, 0.8); }
        }

        /* --- GAYA KHAS SLIDE 2 (TERATAI & FORM NAMA) --- */
        .name-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .name-wrapper label {
            font-size: 1rem;
            letter-spacing: 1.5px;
            color: #bae6fd;
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .name-input {
            width: 100%;
            max-width: 320px;
            padding: 12px 15px;
            background: rgba(4, 13, 26, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 25px;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            text-align: center;
            outline: none;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .name-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        /* Tombol Teratai untuk Konfirmasi Nama */
        .lotus-btn {
            width: 70px;
            height: 70px;
            background: radial-gradient(circle, #0e7490 0%, #164e63 100%);
            color: #a5f3fc;
            border: 1px solid rgba(165, 243, 252, 0.4);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        .lotus-btn:hover {
            transform: translateY(-3px) scale(1.08);
            box-shadow: 0 8px 25px rgba(34, 211, 238, 0.6);
            color: #ffffff;
        }

        /* --- GAYA KHAS SLIDE 3 (PESAN UTAMA) --- */
        .letter-box {
            width: 100%;
            max-height: 75vh;
            overflow-y: auto;
            padding: 5px;
        }

        .letter-box::-webkit-scrollbar {
            width: 4px;
        }
        .letter-box::-webkit-scrollbar-thumb {
            background: rgba(56, 189, 248, 0.3);
            border-radius: 10px;
        }

        .romantic-text {
            font-family: 'Sacramento', cursive;
            font-size: 2.5rem; 
            line-height: 1.4;
            color: #f0f9ff; 
            text-shadow: 
                2px 2px 5px rgba(0, 0, 0, 0.95), 
                -2px -2px 5px rgba(0, 0, 0, 0.95),
                0px 0px 20px rgba(14, 165, 233, 0.6); /* Efek glow biru air teratai */
            margin-bottom: 30px;
            word-wrap: break-word;
        }

        /* Tombol Balas WhatsApp */
        .wa-btn {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 13px 30px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 25px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 290px;
            margin: 10px auto;
        }

        .wa-btn.show {
            opacity: 1;
            transform: scale(1);
            display: inline-flex;
        }

        .wa-btn:hover {
            background-color: #128C7E;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.5);
            transform: translateY(-2px);
        }

        .cursor {
            display: inline-block;
            width: 2px;
            background-color: #f0f9ff;
            animation: blink 0.6s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* --- WATERMARK NAMA PUDAR (POJOK KANAN BAWAH) --- */
        .watermark-name {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 5;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.35);
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>
    <div class="overlay"></div>

    <audio id="romantic-music" loop>
        <source src="musik.mp3" type="audio/mpeg">
    </audio>

    <canvas id="fireflies-canvas"></canvas>

    <div class="slider-container" id="mainSlider">
        
        <div class="slide">
            <div class="box-container">
                <h1 class="opening-greeting">Menatap Lentera Malam...</h1>
                <button class="moon-btn" onclick="geserKeKanan(1)" aria-label="Melangkah">
                    <svg width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M14.43 10.772a7.003 7.003 0 0 1-12.24-6.21 6 6 0 1 0 9.772 8.368 7 7 0 0 1 2.468-2.158z"/>
                    </svg>
                </button>
                <span style="font-size: 0.8rem; letter-spacing: 2px; opacity: 0.7; color: #bae6fd; text-transform: uppercase; margin-top: 15px;">Ketuk Bulan</span>
            </div>
        </div>

        <div class="slide">
            <div class="box-container">
                <div class="name-wrapper">
                    <label for="inputNama">Sebelum mendekat ke air danau, isi dahulu namamu disini ya?</label>
                    <input type="text" id="inputNama" class="name-input" placeholder="Tulis namamu di sini..." autocomplete="off">
                    <button class="lotus-btn" onclick="geserKeKanan(2)" aria-label="Konfirmasi">
                        <svg width="32" height="32" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 21.5c-1.35 0-2.58-.45-3.56-1.2L12 14.5l3.56 5.8c-.98.75-2.21 1.2-3.56 1.2zM2 12c0-3.3 2.03-6.13 4.9-7.3L8.5 8.5 2 12zm15.1-7.3c2.87 1.17 4.9 4 4.9 7.3l-6.5-3.5 1.6-3.8zM12 2.5c1.35 0 2.58.45 3.56 1.2L12 9.5 8.44 3.7c.98-.75 2.21-1.2 3.56-1.2z"/>
                        </svg>
                    </button>
                    <span style="font-size: 0.75rem; letter-spacing: 2px; opacity: 0.6; color: #a5f3fc; text-transform: uppercase; margin-top: 15px;">Simpan Nama</span>
                </div>
            </div>
        </div>

        <div class="slide">
            <div class="box-container">
                <div class="letter-box" id="kotakSurat">
                    <div class="romantic-text">
                        <span id="text-typing"></span><span class="cursor" id="kursor">|</span>
                    </div>
                    <a href="#" id="tombolWA" class="wa-btn" target="_blank">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M13.601 2.326A7.854 7.854 0 0 0 12.41 0H3.59A7.854 7.854 0 0 0 .707 2.326a8.857 8.857 0 0 0-1.07 4.195c0 2.308.814 4.503 2.31 6.223l-.963 3.507 3.597-.944a8.841 8.841 0 0 0 4.19 1.056h.003A7.854 7.854 0 0 0 16 8.583a8.857 8.857 0 0 0-2.399-6.257zM14.75 8.583a7.126 7.126 0 0 1-2.119 5.097 6.305 6.305 0 0 1-4.636 1.942H7.99c-1.391-.004-2.757-.373-3.951-1.066l-.283-.168-2.398.63.64-2.332-.185-.296A7.16 7.16 0 0 1 1.25 8.583a7.126 7.126 0 0 1 2.119-5.097A6.305 6.305 0 0 1 7.99 1.543h.004c1.865 0 3.617.726 4.933 2.042a7.126 7.126 0 0 1 2.123 5.098z"/>
                        </svg>
                        Kirim Balasan Romantis
                    </a>
                </div>
            </div>
        </div>

    </div>

    <div class="watermark-name">Edy | Cindy</div>

    <script>
        const mainSlider = document.getElementById("mainSlider");
        const musik = document.getElementById("romantic-music");
        const textElement = document.getElementById("text-typing");
        const tombolWA = document.getElementById("tombolWA");
        const kotakSurat = document.getElementById("kotakSurat");

        let index = 0;
        let pesanRomantis = "";

        // Fungsi menggeser layar ke kanan (horizontal scroll)
        function geserKeKanan(slideKe) {
            if (slideKe === 1) {
                // Mainkan musik saat transisi pertama
                musik.play().catch(e => console.log("Musik tertahan oleh izin browser: ", e));
                
                // Geser ke Slide ke-2 (100vw ke kiri)
                mainSlider.style.transform = "translateX(-100vw)";
            } 
            else if (slideKe === 2) {
                const namaUser = document.getElementById("inputNama").value.trim();
                if (namaUser === "") {
                    alert("Isi namamu dulu ya cantik/ganteng... 😊");
                    return;
                }

                // Struktur pesan romantis disesuaikan dengan latar belakang teratai dan danau
                pesanRomantis = `Hai ${namaUser}, melihatmu duduk tenang di tepi danau malam ini bagaikan memandang keajaiban paling syahdu. Seperti bunga teratai yang mekar bersinar di atas jernihnya air, keindahan hatimu menembus pekatnya malam dan menerangi seluruh duniaku yang sempat gelap sepi. Terima kasih sudah menjadi lentera terindah di setiap hela napasku. Aku menyayangimu hari ini, esok, dan selamanya...`;

                // Geser ke Slide ke-3 (200vw ke kiri)
                mainSlider.style.transform = "translateX(-200vw)";
                
                // Mulai efek mengetik setelah pergeseran slide selesai
                setTimeout(() => {
                    ketikKarakter();
                }, 1100);
            }
        }

        function ketikKarakter() {
            if (index < pesanRomantis.length) {
                textElement.innerHTML += pesanRomantis.charAt(index);
                index++;
                kotakSurat.scrollTop = kotakSurat.scrollHeight;
                setTimeout(ketikKarakter, 80); 
            } else {
                document.getElementById("kursor").style.display = "none";
                
                const nomorWA = "628xxxxxxxxxx"; // GANTI DENGAN NOMOR WHATSAPP-MU
                const isiBalasan = encodeURIComponent("Sinar cintamu juga telah menghangatkan seluruh duniaku... ❤️✨");
                tombolWA.href = `https://api.whatsapp.com/send?phone=${nomorWA}&text=${isiBalasan}`;
                
                tombolWA.style.display = "inline-flex";
                setTimeout(() => {
                    tombolWA.classList.add("show");
                    kotakSurat.scrollTop = kotakSurat.scrollHeight;
                }, 50);
            }
        }

        // --- SCRIPT EFEK PARTIKEL KUNANG-KUNANG (FIREFLIES EFFECT) ---
        const canvas = document.getElementById('fireflies-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const fireflies = [];
        const count = 45;

        class Firefly {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.8 + canvas.height * 0.2; // Banyak muncul di bagian bawah dekat air
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = -(Math.random() * 0.6 + 0.2); // Melayang lambat ke atas
                this.alpha = Math.random() * 0.6 + 0.2;
                this.oscillation = Math.random() * 0.02; // Efek meliuk-liuk
                this.angle = Math.random() * Math.PI * 2;
            }

            update() {
                this.y += this.speedY;
                this.angle += this.oscillation;
                this.x += Math.sin(this.angle) * 0.3 + this.speedX;

                // Jika keluar dari atas layar, reset ke bawah
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                // Pendaran kuning kehijauan hangat / biru muda serasi air teratai
                ctx.fillStyle = `rgba(165, 243, 252, ${this.alpha})`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = 'rgba(34, 211, 238, 0.8)';
                
                ctx.fill();
                ctx.restore();
            }
        }

        for (let i = 0; i < count; i++) {
            fireflies.push(new Firefly());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fireflies.forEach(f => {
                f.update();
                f.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
 
              // untuk security

       document.addEventListener('keydown', function(event) {
    // Menonaktifkan Ctrl+S (Simpan)
    if (event.ctrlKey && event.key === 's') {
        event.preventDefault();
        alert('Menyimpan halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+P (Cetak)
    if (event.ctrlKey && event.key === 'p') {
        event.preventDefault();
        alert('Mencetak halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+U (Lihat Sumber Halaman)
    if (event.ctrlKey && event.key === 'u') {
        event.preventDefault();
        alert('Melihat sumber halaman dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+F dan Ctrl+G (Kolom Pencarian)
    if (event.ctrlKey && (event.key === 'f' || event.key === 'g')) {
        event.preventDefault();
        alert('Fungsi pencarian di halaman ini dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+C (Salin)
    if (event.ctrlKey && event.key === 'c') {
        event.preventDefault();
        alert('Menyalin konten dinonaktifkan.');
    }

    // Menonaktifkan Ctrl+A (Pilih Semua)
    if (event.ctrlKey && event.key === 'a') {
        event.preventDefault();
        alert('Memilih semua konten dinonaktifkan.');
    }

    // Menonaktifkan F12 (Alat Pengembang)
    if (event.key === 'F12') {
        event.preventDefault();                                                                                   alert('Alat pengembang dinonaktifkan.');
    }
});

// Menonaktifkan menu klik kanan (menu konteks)
document.addEventListener('contextmenu', function(event) {
    event.preventDefault();
    alert('Klik kanan dinonaktifkan.');
});
    </script>
</body>
</html>
